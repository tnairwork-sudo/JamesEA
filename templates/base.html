<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>James</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="app-shell">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="/" class="nav-item">🏠<span>Brief</span></a>
    <a href="/meetings" class="nav-item">📅<span>Meetings</span></a>
    <a href="/clients" class="nav-item">🤝<span>Clients</span></a>
    <a href="/matters" class="nav-item">⚖️<span>Matters</span></a>
    <a href="/personal" class="nav-item">✅<span>Personal</span></a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('{{ url_for('static', filename='sw.js') }}'));
    }
  </script>
</body>
</html>
